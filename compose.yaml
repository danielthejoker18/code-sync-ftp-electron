name: codesyncftp

services:
  app-dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    image: codesyncftp:dev
    working_dir: /app
    environment:
      DISPLAY: ${DISPLAY}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-0}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-/run/user/1000}
      ELECTRON_OZONE_PLATFORM_HINT: auto
    volumes:
      - ./:/app
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XDG_RUNTIME_DIR:-/run/user/1000}:${XDG_RUNTIME_DIR:-/run/user/1000}
      - node_modules:/app/node_modules
    stdin_open: true
    tty: true
    user: "${UID:-1000}:${GID:-1000}"
    command: >
      sh -lc 'if [ -n "$WAYLAND_DISPLAY" ] && [ -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY" ]; then
      export ELECTRON_OZONE_PLATFORM_HINT=wayland;
      else
      export ELECTRON_OZONE_PLATFORM_HINT=auto;
      fi;
      npm start -- --no-sandbox --disable-setuid-sandbox'

  app-build:
    profiles: ["build"]
    build:
      context: .
      target: build
    image: codesyncftp:build
    working_dir: /app
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: >
      sh -lc 'chmod +x /app/node_modules/7zip-bin/linux/x64/7za || true;
      npm run dist -- --linux;
      chown -R 1000:1000 /app/dist || true'

volumes:
  node_modules:
