<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Code Sync Ftp</title>
    <style>
        /* Estilo Dark Mode Simples */
        body { background-color: #1e1e1e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; user-select: none; }
        h3 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0;}
        
        .grid-ftp { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 20px; align-items: end; }
        input { background: #2d2d2d; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box;}
        label { font-size: 12px; color: #aaa; display: block; margin-bottom: 5px;}

        .projects-container { margin-bottom: 20px; max-height: 200px; overflow-y: auto; border: 1px solid #333; padding: 10px; border-radius: 5px;}
        .project-row { display: grid; grid-template-columns: 5fr 5fr 1fr; gap: 10px; margin-bottom: 10px; align-items: end;}
        .remote-field { display: flex; gap: 5px; }
        
        button { cursor: pointer; padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s;}
        .btn-add { background: #2196f3; color: white; }
        .btn-remove { background: #f44336; color: white; }
        .btn-folder { background: #444; color: white; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-start { background: #4caf50; color: white; width: 100%; font-size: 16px; padding: 12px;}
        .btn-stop { background: #f44336; color: white; width: 100%; font-size: 16px; display: none;}
        .btn-test { background: #ff9800; color: white; }
        .btn-remote-folder { background: #607d8b; color: white; white-space: nowrap; }
        .ftp-test-cell label { visibility: hidden; }

        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
        }
        .modal {
            width: min(700px, 92vw);
            margin: 60px auto;
            background: #1b1b1b;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
        }
        .modal h4 { margin: 0 0 8px; }
        .remote-current-path {
            font-family: monospace;
            font-size: 13px;
            color: #9ad;
            background: #101010;
            border: 1px solid #2d2d2d;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 10px;
            word-break: break-all;
        }
        .remote-list {
            height: 240px;
            overflow-y: auto;
            border: 1px solid #2d2d2d;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 12px;
            background: #101010;
        }
        .remote-item {
            width: 100%;
            text-align: left;
            padding: 8px;
            margin-bottom: 6px;
            background: #2a2a2a;
            color: #ddd;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
            font-weight: 500;
        }
        .remote-item:hover { background: #353535; }
        .remote-actions {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }
        .remote-actions-right {
            display: flex;
            gap: 8px;
        }

        #logs { background: #111; height: 250px; overflow-y: scroll; padding: 10px; font-family: monospace; font-size: 13px; border-radius: 5px; border: 1px solid #333;}
        .log-item { margin-bottom: 4px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .info { color: #aaa; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
    </style>
</head>
<body>

    <h3>1. Configuração FTP</h3>
    <div class="grid-ftp">
        <div><label>Host</label><input type="text" id="host" placeholder="ftp.exemplo.com"></div>
        <div><label>Usuário</label><input type="text" id="user"></div>
        <div><label>Senha</label><input type="password" id="password"></div>
        <div><label>Porta</label><input type="number" id="port" value="21"></div>
        <div class="ftp-test-cell">
            <label>Teste</label>
            <button id="btnTest" class="btn-test" onclick="testCredentials()">Testar Conexão</button>
        </div>
    </div>

    <h3>2. Mapeamento de Pastas</h3>
    <div id="projects-list" class="projects-container">
        </div>
    <button class="btn-add" onclick="addProjectRow()">+ Adicionar Projeto</button>

    <br><br>

    <div class="controls">
        <button id="btnStart" class="btn-start" onclick="toggleSync(true)">▶ INICIAR</button>
        <button id="btnStop" class="btn-stop" onclick="toggleSync(false)">⏹ PARAR</button>
    </div>

    <h3>Logs</h3>
    <div id="logs"></div>

    <div id="remotePickerModal" class="modal-backdrop">
        <div class="modal">
            <h4>Selecionar Pasta Remota (FTP)</h4>
            <div id="remoteCurrentPath" class="remote-current-path">/</div>
            <div id="remoteList" class="remote-list"></div>
            <div class="remote-actions">
                <button id="remoteUpBtn" onclick="remotePickerGoUp()">Subir Pasta</button>
                <div class="remote-actions-right">
                    <button onclick="closeRemotePicker()">Cancelar</button>
                    <button class="btn-test" onclick="confirmRemotePickerSelection()">Selecionar Esta Pasta</button>
                </div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
